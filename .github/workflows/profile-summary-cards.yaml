name: GitHub Profile Summary Cards

on:
  schedule:
    # The event occurs every day at 3 AM JST.
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      # Pinned to a full commit SHA. Mutable refs (tags / branches) can be
      # repointed by the upstream owner, so they are not safe against a
      # supply-chain compromise.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # `@release` used to be a *branch*, not even a tag: upstream moved it on
      # 2026-07-17 and again on 2026-07-23 without any change on our side.
      # Pinned to the 2026-07-23 deploy commit (deploy: a9a21d5c).
      - uses: vn7n24fzkq/github-profile-summary-cards@4a9822e91a20eae650b9591769569976f0d578ba # release, 2026-07-23
        env:
          # SUMMARY_GITHUB_TOKEN must be a *classic* PAT with `public_repo`
          # and `read:user`. This is not a preference - the other token types
          # cannot build ProfileDetailsCard and StatsCard at all.
          #
          # On 2026-06-30 GitHub announced that the stargazers and watchers
          # endpoints would be restricted to a repository's own admins and
          # collaborators, because the public lists were being scraped for
          # spam. The rollout landed on 07-22 and also covers the GraphQL
          # `stargazers` connection, which the action queries as
          # `user.repositories.nodes.*.stargazers`. Everyone using the action
          # broke the same day (vn7n24fzkq/github-profile-summary-cards#311).
          # https://github.blog/changelog/2026-06-30-upcoming-access-restrictions-to-public-api-endpoints-and-ui-views/
          #
          # Owner access is explicitly *not* restricted, so what matters is
          # whether the token authenticates as the owner. Measured on 07-23,
          # same query, 26 public repos:
          #
          #   GITHUB_TOKEN                     25/26 null  (installation token,
          #                                                 only this repo)
          #   fine-grained, public-repos-RO    26/26 null  (that setting reads
          #                                                 *other* people's
          #                                                 public repos, so it
          #                                                 never counts as the
          #                                                 owner - worse than
          #                                                 GITHUB_TOKEN)
          #   classic, public_repo             0/26 null   (owner - works)
          #
          # The fallback keeps the three language/time cards building if the
          # PAT is ever removed, but those cards then only see this one repo,
          # and the two above disappear again.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
