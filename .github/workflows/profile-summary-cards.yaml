name: GitHub Profile Summary Cards

on:
  schedule:
    # The event occurs every day at 3 AM JST.
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      # Pinned to a full commit SHA. Mutable refs (tags / branches) can be
      # repointed by the upstream owner, so they are not safe against a
      # supply-chain compromise.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # `@release` used to be a *branch*, not even a tag: upstream moved it on
      # 2026-07-17 and again on 2026-07-23 without any change on our side.
      # Pinned to the 2026-07-23 deploy commit (deploy: a9a21d5c).
      - uses: vn7n24fzkq/github-profile-summary-cards@4a9822e91a20eae650b9591769569976f0d578ba # release, 2026-07-23
        env:
          # ProfileDetailsCard and StatsCard have been failing since
          # 2026-07-22 and no token can fix it:
          #
          #   Error: Resource not accessible by integration
          #
          # GitHub announced on 2026-06-30 that the stargazers and watchers
          # endpoints would be restricted to admins and collaborators, to stop
          # them being scraped for spam. That rollout landed on 07-22 and also
          # covers the GraphQL `stargazers` connection, which the action asks
          # for as `user.repositories.nodes.*.stargazers`. Measured here:
          # GITHUB_TOKEN 25/26 null, fine-grained PAT 26/26 null. The scalar
          # `stargazerCount` is still readable, so the fix belongs upstream
          # (vn7n24fzkq/github-profile-summary-cards#311), not in our token.
          # https://github.blog/changelog/2026-06-30-upcoming-access-restrictions-to-public-api-endpoints-and-ui-views/
          #
          # The PAT is still worth having: with GITHUB_TOKEN the language and
          # productive-time cards only see this one repository, while a
          # user-scoped token covers all 26. Falling back keeps those three
          # cards building if the PAT is absent or expires.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
